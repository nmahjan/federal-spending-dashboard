# GitHub Action: Monthly Federal Spending Data Update
# Runs on the 1st of each month to fetch latest data from USAspending.gov and Treasury

name: Update Federal Spending Data

on:
  # Run monthly on the 1st at 6 AM UTC
  schedule:
    - cron: '0 6 1 * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual data refresh'

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Fetch federal spending data
        run: |
          echo "Starting data fetch at $(date)"
          python scripts/fetch_federal_data.py
          echo "Data fetch completed at $(date)"
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet frontend/src/data/spending.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changes detected"
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add frontend/src/data/spending.json
          git commit -m "chore: Update federal spending data [$(date +'%Y-%m-%d')]"
          git push
      
      - name: Summary
        run: |
          echo "## Data Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            echo "- **Status:** New data committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:** No changes (data unchanged)" >> $GITHUB_STEP_SUMMARY
          fi
